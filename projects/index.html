<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Proyectos de desarrollo web y hardware de Umar Sharif Muhammad Iglesias">
    <title>Proyectos | Umar Sharif</title>

</head>
<body>
    <header class="navbar" role="banner">
        <div class="container nav-content">
            <a href="/" class="logo" aria-label="Inicio">US.</a>
            <nav class="nav-links" role="navigation">

    <main id="main-content" class="container">

                <h2>Mis Proyectos</h2>

            <div id="projects-container" class="projects-grid" aria-live="polite">

                <p>Cargando proyectos desde GitHub...</p>

    <footer role="contentinfo">

            <p>&copy; 2026 Umar Sharif Muhammad Iglesias. Desarrollado con pasión.</p>
