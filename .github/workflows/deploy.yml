name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run lint

      - name: Build (PDF & Sitemap)
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.0
          lhci autorun --upload.target=temporary-public-storage || echo "Lighthouse failed but continuing"

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update auto-generated assets (PDF & Sitemap)"
          file_pattern: 'assets/cv.pdf sitemap.xml'
